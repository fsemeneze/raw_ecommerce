
name: 'portfolio_ecommerce'
version: '1.0.0'
profile: 'portfolio_ecommerce'

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

clean-targets:
  - "target"
  - "dbt_packages"

models:
  portfolio_ecommerce:
    staging:
      +materialized: view
      +schema: staging
    marts:
      +materialized: table
      +schema: marts
      dim_geolocation:
        +materialized: table
        +schema: marts
        +partition_by:
          field: zip_code_prefix
          data_type: string
          granularity: day
        +cluster_by: ["state"]

